[globals]
; General internal dialing options used in context Dial-Users.
; Only the timeout is defined here. See the Dial app documentation for
; additional options.
INTERNAL_DIAL_OPT=,30
TTS_CACHE_DIR=/var/lib/asterisk/sounds/tts_cache/tel42edgetts
TTS_VOICE=en-US-AvaMultilingualNeural

[general]
static=yes
writeprotect=no
clearglobalvars=no

[context-pstn]

exten => _.!,1,NoOp()
 same => n,ExecIf($["${CALLERID(num):0:1}" != "+"]?Set(CALLERID(num)=+1${CALLERID(num)}))
 same => n,Goto(ivr-pstn,s,1)

[context-webdemo]

exten => _X!,1,ExecIf($["${CHANNEL(channeltype)}" != "Message"]?Set(CALLERID(name)=${CALLERID(name)} (${CHANNEL(pjsip,remote_addr)})))
 same => n,Goto(context-local-only,${EXTEN},1)

exten => _+X!,1,ExecIf($["${CHANNEL(channeltype)}" != "Message"]?Set(CALLERID(name)=${CALLERID(name)} (${CHANNEL(pjsip,remote_addr)})))
 same => n,Goto(context-local-only,${EXTEN},1)

exten => i,1,Goto(ext-invalid,invalidinput,5)

[context-local]

; telephony42
exten => _+042X.,1,Goto(ext-peer,${EXTEN},5)
exten => _00042X.,1,Goto(ext-peer,+${EXTEN:2},5)
exten => _042X.,1,Goto(ext-peer,+${EXTEN},5)
; old e164.dn42
exten => _+424X.,1,Goto(ext-peer,${EXTEN},5)
exten => _00424X.,1,Goto(ext-peer,+${EXTEN:2},5)
; pstn
exten => _00.,1,Goto(ext-pstn,${EXTEN},5)
exten => _+.,1,Goto(ext-pstn,${EXTEN},5)
; local shortcode
exten => _XXXX,1,Goto(ext-local-0803,${EXTEN},5)
; telephony42 shortcode
exten => _X!,1,Goto(ext-peer,+042${EXTEN},5)

; Catch Invalid
exten => i,1,Goto(ext-invalid,invalidinput,5)

[context-local-only]

; telephony42
exten => _+042X.,1,Goto(ext-peer,${EXTEN},5)
exten => _00042X.,1,Goto(ext-peer,+${EXTEN:2},5)
exten => _042X.,1,Goto(ext-peer,+${EXTEN},5)
; old e164.dn42
exten => _+424X.,1,Goto(ext-peer,${EXTEN},5)
exten => _00424X.,1,Goto(ext-peer,+${EXTEN:2},5)
; local shortcode
exten => _XXXX,1,Goto(ext-local-0803,${EXTEN},5)
; telephony42 shortcode
exten => _X!,1,Goto(ext-peer,+042${EXTEN},5)

; Catch Invalid
exten => i,1,Goto(ext-invalid,invalidinput,5)

[context-peer]

; remove 00 as +
exten => _00X!,1,Goto(context-peer,+${EXTEN:2},1)

; prepend + if not
exten => _X!,1,Goto(context-peer,+${EXTEN},1)

; prepend + to caller id num if not
exten => _+X!,1,Set(CALLERID(num)=${IF($["${CALLERID(num):0:2}"="00"]?+${CALLERID(num):2}:${CALLERID(num)})})
 same => n,Set(CALLERID(num)=${IF($["${CALLERID(num):0:1}"="+"]?${CALLERID(num)}:+${CALLERID(num)})})
 ; enforce local number
 same => n,GotoIf($["${CALLERID(num):0:9}"="+04240803"]?invalidcaller,1)
 same => n,GotoIf($["${CALLERID(num):0:9}"="+42400803"]?invalidcaller,1)
 same => n,GotoIf($["${CALLERID(num):0:9}"="+04241331"]?invalidcaller,1)
 same => n,GotoIf($["${CALLERID(num):0:9}"="+42401331"]?invalidcaller,1)
 same => n,Goto(ext-peer,${EXTEN},5)

; drop invalid caller
exten => invalidcaller,1,Playback(silence/1&sorry-youre-having-problems)
 same => n,Hangup()

; Catch Invalid
exten => i,1,Goto(ext-invalid,invalidinput,5)

[context-enum]

; remove 00 as +
exten => _00X!,1,Goto(context-enum,+${EXTEN:2},1)

; prepend + if not
exten => _X!,1,Goto(context-enum,+${EXTEN},1)

; prepend + to caller id num if not
exten => _+X!,1,Set(CALLERID(num)=${IF($["${CALLERID(num):0:2}"="00"]?+${CALLERID(num):2}:${CALLERID(num)})})
 same => n,Set(CALLERID(num)=${IF($["${CALLERID(num):0:1}"="+"]?${CALLERID(num)}:+${CALLERID(num)})})

 ; verify logic start
 same => n,Set(CALLERID_NUM=${CALLERID(num)})
 same => n,Set(REAL_SRC=${IF($["${CHANNEL(channeltype)}" = "PJSIP"]?${CHANNEL(pjsip,remote_addr)}:)})

 same => n,Log(NOTICE, ENUM Verify Started for ${CALLERID_NUM} and ${REAL_SRC})
 same => n,AGI(/usr/local/bin/tel42verifier,"-config","/etc/tel42verifier/config.yaml",${CALLERID_NUM},${REAL_SRC})

 same => n,Log(NOTICE, ENUM Verify Result: ${ENUM_VERIFY_RESULT})
 same => n,Log(NOTICE, ENUM DNSSEC Result: ${ENUM_DNSSEC_STATUS})
 same => n,GotoIf($["${ENUM_VERIFY_RESULT}"="PASS"]?check_dnssec)
 same => n,GotoIf($["${ENUM_VERIFY_RESULT}"="NO_ENUM_RECORD"]?no_record)
 same => n,GotoIf($["${ENUM_VERIFY_RESULT}"="SPOOFED"]?spoofed)

 same => n,Log(NOTICE, ENUM Error)
 same => n,Hangup(21)

 same => n(check_dnssec),NoOp()
 same => n,GotoIf($["${ENUM_DNSSEC_STATUS}"="FAIL"]?spoofed)
 same => n,GotoIf($["${ENUM_DNSSEC_STATUS}"="NONE"]?dnssec_none:trusted)

 same => n(dnssec_none),Log(NOTICE, ENUM DNSSEC Status is NONE)
 same => n,Playback(beep)
 same => n,Goto(trusted)

 same => n(trusted),Log(NOTICE, ENUM Verify Success, goto ${EXTEN})
 same => n,Goto(context-peer,${EXTEN},1)

 same => n(spoofed),Log(NOTICE, ENUM Verify Failed)
 same => n,Playback(silence/1&im-sorry)
 same => n,Hangup(21)

 same => n(no_record),Log(NOTICE, ENUM Verify Unknown (record not found))
 same => n,Playback(silence/1&from-unknown-caller)
 same => n,Hangup()

#include dialplan/ext-pstn.conf
#include dialplan/ext-peer.conf
#include dialplan/ext-local-0803.conf
#include dialplan/ext-local-1331.conf
#include dialplan/ext-enum.conf
#include dialplan/ext-invalid.conf
#include dialplan/sub-sms.conf
#include dialplan/ivr/*.conf
