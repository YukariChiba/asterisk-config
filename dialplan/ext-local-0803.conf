[ext-local-0803]

exten => fax,5,Answer()
 same => n,Queue(faxs)
 same => n,Hangup()

; ==== Phones (0xxx)

; yukari: 001X
exten => 0011,5,GoSub(sub-dial,s,1(PJSIP/yukari-phone,pjsip:yukari-phone,0010,15))
exten => 0012,5,GoSub(sub-dial,s,1(PJSIP/yukari-lpc,pjsip:yukari-lpc,0010,15))
exten => 0013,5,GoSub(sub-dial,s,1(PJSIP/yukari-lpc,pjsip:yukari-modem,,15))
; fallback voice mail for yukari
exten => _001X,5,VoiceMail(0010,u)
 same => n,Hangup()

; gensokyo home: 002X
exten => 0021,5,GoSub(sub-dial,s,1(PJSIP/gensokyo-1,,,15))

; ==== Programs (3xxx)

; 300X: number readout

exten => 3001,5,Answer()
 same => Playback(silence/1&your&number&is)
 same => n,SayAlpha(${CALLERID(num)})
 same => n,Playback(silence/1)
 same => n,Hangup()

exten => 3002,5,Answer()
 same => n,Playback(silence/1)
 same => n,Set(TTS_CACHE=false)
 same => n,AGI(/usr/local/bin/tel42edgetts, "Welcome. Your number is ${CALLERID(num)}.")
 same => n,Hangup()

; 310X: jokes

exten => 3101,5,Answer()
 same => n,Goto(ivr-anti-fool,s,1)

; 320X: SSTV
exten => 3201,5,Goto(ivr-sstv-qsl,s,1)

; 330X: AI Agents
; gensokyo ai agent
exten => 3301,5,Answer()
 same => n,Playback(silence/1)
 same => n,AGI(/usr/local/bin/tel42edgetts,"You are about to make a phone call that will be handled entirely by an AI agent. The generated content may take some time and may not be entirely accurate.")
 same => n,Set(TTS_CACHE=false)
 same => n,Set(TTS_IVR_TIMEOUT=10000)
 same => n,AGI(/usr/local/bin/tel42ai,-config-dir,/etc/tel42ai/gensokyo)
 same => n,Hangup()

; dn42 foundation ai agent
exten => 3302,5,Answer()
 same => n,Playback(silence/1)
 same => n,AGI(/usr/local/bin/tel42edgetts,"You are about to make a phone call that will be handled entirely by an AI agent. The generated content may take some time and may not be entirely accurate.")
 same => n,Set(TTS_CACHE=false)
 same => n,Set(TTS_IVR_TIMEOUT=10000)
 same => n,AGI(/usr/local/bin/tel42ai,-config-dir,/etc/tel42ai/dn42-foundation)
 same => n,Hangup()

; ==== Fax and Dialups (4XXX)

; main fax queue
exten => 4001,5,Answer()
 same => n,Queue(faxs)
 same => n,Hangup()

; dialup servers
exten => 4101,5,GoSub(sub-dial,s,1(PJSIP/modem-b103-1,,,15))
exten => 4102,5,GoSub(sub-dial,s,1(PJSIP/modem-b103-2,,,15))
exten => 4103,5,GoSub(sub-dial,s,1(PJSIP/modem-v23-1,,,15))
exten => 4104,5,GoSub(sub-dial,s,1(PJSIP/modem-v23-2,,,15))
exten => 4105,5,GoSub(sub-dial,s,1(PJSIP/modem-v32-n3-1,,,15))
exten => 4106,5,GoSub(sub-dial,s,1(PJSIP/modem-v32-n3-2,,,15))

; ==== Musics (5XXX)

; bad apple hd
exten => 5001,5,Answer()
 same => n,Wait(1)
 same => n,Playback(/var/lib/asterisk/sounds/bad-apple/bad-apple-hd)
 same => n,Hangup()

; ====  Functions (8xxx)

; voice mail
exten => 8001,5,Answer()
 same => n,Set(CALLERID_NUM=${CALLERID(num)})
 same => n,GotoIf($["${CALLERID_NUM:0:9}" = "+04240803"]?valid)
 same => n,Goto(ext-invalid,invalidinput,5)
 same => n(valid),VoiceMailMain(${CALLERID_NUM:9},s)
 same => n,Hangup()

; pstn gateway rejection
exten => 8100,5,GotoIf($["${CHANNEL(channeltype)}" = "Message"]?sms)
 same => n,Answer()
 same => n,Playback(silence/1)
 same => n,AGI(/usr/local/bin/tel42edgetts, "Sorry, this is a PSTN gateway, you can not make calls to it.")
 same => n(sms),Hangup()

; ==== Special (99xx)

; webrtc rejection
exten => 9910,5,GotoIf($["${CHANNEL(channeltype)}" = "Message"]?sms)
 same => n,Answer()
 same => n,Playback(silence/1)
 same => n,AGI(/usr/local/bin/tel42edgetts, "Sorry, this is a shared web phone, you can not make calls to it.")
 same => n,Hangup()
 same => n(sms),GoSub(sub-sms-send,s,1(pjsip:webdemo))

; undefined ext
exten => _X!,5,Goto(ext-invalid,invalidinput,5)
exten => _+X!,5,Goto(ext-invalid,invalidinput,5)
