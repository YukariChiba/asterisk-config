[peer-template-endpoint](!)
type=endpoint
context=context-peer
allow=!all,opus,ulaw,alaw
rtp_symmetric=no
force_rport=yes
rewrite_contact=yes
identify_by=ip
fax_detect=yes
trust_id_inbound=yes
trust_id_outbound=yes
send_pai=yes

[peer-template-auth](!)
type=auth

[peer-template-aor](!)
type=aor
max_contacts=1
remove_existing=yes
