[peer-enum-inbound]
type=endpoint
context=context-enum
allow=!all,opus,g722,speex,g726,ulaw,alaw,vp9,h265,vp8,h264
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
trust_id_inbound=yes

[peer-enum-inbound]
type=identify
endpoint=peer-enum-inbound
match=172.20.0.0/14
match=10.0.0.0/8
match=172.31.0.0/16
match=fd00::/8
